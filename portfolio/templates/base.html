<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ site_title }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/site.css') }}" />
    {% block head %}{% endblock %}
  </head>
  <body>
    <div class="bg-ornament bg-ornament-top"></div>
    <div class="bg-ornament bg-ornament-bottom"></div>

    <nav class="navbar navbar-expand-lg navbar-dark sticky-top glass-nav">
      <div class="container">
        <a class="navbar-brand fw-semibold" href="{{ url_for('main.home') }}">{{ site_title }}</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav" aria-controls="nav" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="nav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item"><a class="nav-link {% if request.endpoint == 'main.home' %}active{% endif %}" href="{{ url_for('main.home') }}">Home</a></li>
            <li class="nav-item"><a class="nav-link {% if request.endpoint == 'main.resume' %}active{% endif %}" href="{{ url_for('main.resume') }}">Resume</a></li>
            <li class="nav-item"><a class="nav-link {% if request.endpoint == 'main.projects' %}active{% endif %}" href="{{ url_for('main.projects') }}">Projects</a></li>
            <li class="nav-item"><a class="nav-link {% if request.endpoint == 'main.contact' %}active{% endif %}" href="{{ url_for('main.contact') }}">Contact</a></li>
          </ul>
        </div>
      </div>
    </nav>

    <main class="container py-5 page-shell">
      {% block content %}{% endblock %}
    </main>

    <footer class="footer-wrap py-4 mt-4">
      <div class="container d-flex flex-wrap justify-content-between align-items-center gap-2 small text-muted">
        <span>© {{ current_year }} {{ site_title }}</span>
        <span>
          <a href="{{ github_url }}" target="_blank" rel="noopener">GitHub</a>
          ·
          <a href="{{ linkedin_url }}" target="_blank" rel="noopener">LinkedIn</a>
        </span>
      </div>
    </footer>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
