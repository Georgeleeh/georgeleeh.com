<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ site_title }}</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='url(%23gradient)'/%3E%3Cdefs%3E%3ClinearGradient id='gradient' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' style='stop-color:%2366D9FF'/%3E%3Cstop offset='100%25' style='stop-color:%239F7AEA'/%3E%3C/linearGradient%3E%3C/defs%3E%3Ctext x='50' y='70' font-size='60' fill='%23091021' font-weight='800' text-anchor='middle' font-family='system-ui'%3E✦%3C/text%3E%3C/svg%3E" />
    
    <!-- Meta Tags -->
    <meta name="description" content="Backend Developer specializing in data-intensive systems, cloud architecture, and analytics platforms. Python, SQL, AWS, Docker, Terraform." />
    <meta name="author" content="George Harris" />
    
    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="{{ site_title }} - Backend Developer" />
    <meta property="og:description" content="Backend Developer at Retail Spotlight specializing in data-intensive backend systems, managing billions of transactions daily on AWS." />
    <meta property="og:url" content="https://georgeleeh.com" />
    <meta property="og:site_name" content="{{ site_title }}" />
    
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="{{ site_title }} - Backend Developer" />
    <meta name="twitter:description" content="Backend Developer specializing in data platforms, cloud architecture, and analytics. Python • SQL • AWS • Docker • Terraform" />
    
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/site.css') }}" />
    {% block head %}{% endblock %}
  </head>
  <body>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <header class="site-header">
      <div class="container nav-wrap">
        <a class="brand" href="{{ url_for('main.home') }}">
          <span class="brand-badge">✦</span>
          <span class="brand-text">{{ site_title }}</span>
        </a>
        <button id="menuToggle" class="menu-toggle" aria-label="Toggle menu" aria-expanded="false" aria-controls="siteNav">
          Menu
        </button>
        <nav id="siteNav" class="site-nav" aria-label="Main navigation">
          <a class="nav-link {% if request.endpoint == 'main.home' %}active{% endif %}" href="{{ url_for('main.home') }}">Home</a>
          <a class="nav-link {% if request.endpoint == 'main.resume' %}active{% endif %}" href="{{ url_for('main.resume') }}">Resume</a>
          <a class="nav-link {% if request.endpoint == 'main.projects' %}active{% endif %}" href="{{ url_for('main.projects') }}">Projects</a>
          <a class="nav-link {% if request.endpoint == 'main.contact' %}active{% endif %}" href="{{ url_for('main.contact') }}">Contact</a>
        </nav>
      </div>
    </header>

    <main class="container page-shell">
      {% block content %}{% endblock %}
    </main>

    <footer class="footer-wrap">
      <div class="container footer-inner">
        <span>© {{ current_year }} {{ site_title }}</span>
        <span class="footer-links">
          <a href="{{ linkedin_url }}" target="_blank" rel="noopener">LinkedIn</a>
        </span>
        <span class="footer-note">Built with Flask + Github Copilot + Sugar Free Redbull</span>
      </div>
    </footer>

    <script src="{{ url_for('static', filename='js/site.js') }}"></script>
  </body>
</html>
